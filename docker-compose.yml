services:
  app:
    build: .
    ports:
      - "8800:8000"   # web UI at http://localhost:8800 (host:container)
    # Only HF_TOKEN is needed here; all job parameters (source, language, model,
    # device, ...) are chosen in the web UI.
    env_file:
      - .env
    volumes:
      - ./data:/data           # inputs + generated .srt + job state (voxset.db) land here
      - model-cache:/cache     # persist downloaded models between runs
    # GPU access. Requires NVIDIA Container Toolkit (Linux) or Docker Desktop
    # GPU support (Windows/WSL2). No GPU? Use docker-compose.cpu.yml instead.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  model-cache:
